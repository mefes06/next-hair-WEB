<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Admin Paneli</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote.min.js"></script>
    <style>
        /* GENEL AYARLAR */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f4f4f4;
            overflow: hidden;
        }

        /* 1. SOL SIDEBAR */
        .sidebar {
            width: 250px;
            background-color: #2f4f4f;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            flex-shrink: 0;
        }

        .sidebar h2 {
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 1px solid #4a6b6b;
            padding-bottom: 10px;
        }

        .menu-group {
            margin-bottom: 30px;
        }

        .menu-title {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .menu-btn {
            display: block;
            padding: 12px 15px;
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            width: 100%;
            text-align: left;
            font-size: 14px;
        }

        .menu-btn:hover,
        .menu-btn.active {
            background: #d32f2f;
        }

        .menu-btn i {
            margin-right: 10px;
        }

        .logout-btn {
            margin-top: auto;
            background: #333;
        }

        /* 2. SAĞ İÇERİK ALANI */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        /* POST & KATEGORİ LİSTELEME KUTULARI */
        .post-list-item {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #2f4f4f;
            transition: background-color 0.2s;
        }

        .post-list-item:hover {
            background-color: #fcfcfc;
        }

        .post-info h4 {
            font-size: 18px;
            color: #333;
            margin-bottom: 5px;
        }

        .post-info span {
            font-size: 12px;
            color: #777;
            background: #eee;
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* BUTON GRUBU HİZALAMASI (ÖNEMLİ) */
        .action-btns {
            display: flex;
            gap: 10px;
            /* Butonlar arası boşluk */
            align-items: center;
        }

        /* GENEL BUTON STİLİ (Hizalama Sorununu Çözer) */
        .btn-edit,
        .btn-delete {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 15px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            height: 32px;
            /* Yükseklik sabitlendi */
            min-width: 90px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid transparent;
            line-height: 1;
        }

        /* DÜZENLE BUTONU (SARI) */
        .btn-edit {
            background-color: #ffc107;
            color: #333;
        }

        .btn-edit:hover {
            background-color: #e0a800;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(255, 193, 7, 0.2);
        }

        /* SİL BUTONU (MODERN OUTLINE KIRMIZI) */
        .btn-delete {
            background-color: transparent;
            color: #dc3545;
            border: 1px solid #dc3545 !important;
        }

        .btn-delete:hover {
            background-color: #dc3545;
            color: white !important;
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
            transform: translateY(-1px);
        }

        .btn-delete:active {
            transform: translateY(0);
        }

        /* FORM STİLLERİ */
        .form-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 1200px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        input,
        textarea,
        .special {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #2f4f4f;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>Admin Paneli</h2>

        <div class="menu-group">
            <div class="menu-title">POSTS (İÇERİK)</div>
            <button class="menu-btn active" onclick="showSection('postListSection'); postlariGetir()">
                <i class="bi bi-list-ul"></i> Tüm Postlar
            </button>
            <button class="menu-btn" onclick="showAddPostForm()">
                <i class="bi bi-plus-circle"></i> Yeni Post Ekle
            </button>
        </div>

        <div class="menu-group">
            <div class="menu-title">CATALOGS (KATEGORİ)</div>
            <button class="menu-btn" onclick="showSection('catListSection'); kategorileriYonet()">
                <i class="bi bi-tags"></i> Kategorileri Yönet
            </button>
        </div>

        <a href="/api/logout" class="menu-btn logout-btn"><i class="bi bi-box-arrow-left"></i> Çıkış Yap</a>
    </div>

    <div class="main-content">

        <div id="postListSection" class="view-section active">
            <h2 style="margin-bottom: 20px; color: #2f4f4f;">Mevcut Postlar</h2>
            <div id="postsContainer">
                <p>Yükleniyor...</p>
            </div>
        </div>

        <div id="postFormSection" class="view-section">
            <h2 id="formTitle" style="margin-bottom: 20px;">Yeni İçerik Ekle</h2>
            <div class="form-box">
                <form id="postForm">
                    <input type="hidden" id="editId">

                    <label>Kategori (Çoklu seçim için CTRL'ye basılı tutun):</label>
                    <select id="categorySelect" class="special" required multiple style="height: 150px;">
                    </select>

                    <label>Başlık:</label>
                    <input type="text" id="title" required>

                    <label>Kapak Resmi:</label>
                    <input type="file" id="imageFile" accept="image/*">
                    <p id="currentImgText" style="font-size:12px; color:green; display:none;">Mevcut resim korunacak.
                    </p>

                    <label>Kısa Özet:</label>
                    <input type="text" id="summary">

                    <label>Detaylı Açıklama:</label>

                    <div style="margin-bottom: 5px;">
                        <button type="button" onclick="kaynakSablonuEkle()"
                            style="background: #e67e22; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;">
                            <i class="bi bi-link-45deg"></i> Kaynak Linki Şablonu Ekle
                        </button>
                        <small style="color:#666; margin-left:5px;">(Önce imleci resmin altına tıkla, sonra buna
                            bas)</small>
                    </div>

                    <textarea id="description" rows="5"></textarea>
                    <textarea id="description" rows="5"></textarea>

                    <button type="submit" class="btn-submit" id="submitBtn">YAYINLA</button>
                    <button type="button" onclick="showSection('postListSection')"
                        style="margin-top:10px; background:#ddd; padding:10px; width:100%; border:none; cursor:pointer;">İptal</button>
                </form>
            </div>
        </div>

        <div id="catListSection" class="view-section">
            <h2 style="margin-bottom: 20px;">Kategoriler</h2>

            <div
                style="background:white; padding:20px; margin-bottom:20px; border-radius:8px; display:flex; gap:10px; align-items: center;">

                <select id="parentGroupSelect"
                    style="padding: 12px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer;">
                    <option value="" disabled="" selected="">Grup Seçiniz...</option>
                    <option value="Colors">Hair Colors</option>
                    <option value="Haircuts">Haircuts &amp; Hairstyles</option>
                </select>

                <input type="text" id="newCatName" placeholder="Yeni Kategori Adı"
                    style="margin:0; flex:1; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;">

                <button onclick="kategoriEkle()"
                    style="background:#28a745; color:white; border:none; padding:12px 25px; border-radius: 4px; cursor:pointer; font-weight: bold;">EKLE</button>

            </div>

            <div id="catsContainer">
            </div>
        </div>

    </div>

    <script src="/adminScript.js"></script>
</body>

</html>
