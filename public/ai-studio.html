<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hair Studio - Next Hair</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="ai-studio.css">
</head>

<body>
    <header class="top-header ai-studio-header">
        <div class="container" style="display: flex; justify-content: center;">
            <div class="logo-area" style="text-align: center;">
                <h1 class="site-logo" style="margin: 0;"><a href="/">Next Hair</a></h1>
                <span class="site-slogan" style="display: block; font-size: 14px; margin-top: 5px;">AI Studıo</span>
            </div>
        </div>
    </header>
    <div class="ai-studio-wrapper">
        <div class="ai-quiz-container">

            <div class="quiz-header">
                <h2>Find Your Best<br>Hairstyle Yet ✨</h2>
                <p>Personalized hairstyle picks based on your features<br>— with instant AI try-on.</p>
                <div class="quiz-badge">3-MINUTE QUIZ</div>
            </div>

            <div class="gender-cards-wrapper">
                <div class="gender-card" onclick="alert('Kadın seçildi! (2. adıma geçilecek)')">
                    <div class="card-bg"></div>
                    <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" alt="Woman" class="person-img">
                    <div class="card-label">Woman <i class="bi bi-arrow-right"></i></div>
                </div>

                <div class="gender-card" onclick="alert('Erkek seçildi! (2. adıma geçilecek)')">
                    <div class="card-bg"></div>
                    <img src="https://cdn-icons-png.flaticon.com/512/4140/4140037.png" alt="Man" class="person-img">
                    <div class="card-label">Man <i class="bi bi-arrow-right"></i></div>
                </div>
            </div>

            <div class="quiz-footer">
                <a href="#" class="how-it-works"><i class="bi bi-info-circle"></i> How It Works?</a>

                <div class="trust-section">
                    <div class="avatars">
                        <img src="https://i.pravatar.cc/100?img=1" alt="user">
                        <img src="https://i.pravatar.cc/100?img=5" alt="user">
                        <img src="https://i.pravatar.cc/100?img=9" alt="user">
                        <img src="https://i.pravatar.cc/100?img=10" alt="user">
                    </div>
                    <span>Trusted by 15,000+ women</span>
                </div>

                <p class="terms-text">By continuing, You agree to the <a href="#">Terms and Conditions</a> and <a
                        href="#">Privacy Policy</a></p>
            </div>

        </div>
    </div>

</body>

</html>
